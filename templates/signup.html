{% extends 'base.html' %}
{% load static %}

{% block content %}

<div class="login-page">

    <div class="login-card">

        <h1>📝 Create Account</h1>

        <p>
            Create your PlantAI account and start detecting diseases.
        </p>
        {% if error %}
          <p style="color:red;">
    {{ error }}
      </p>
{% endif %}

<form method="POST">
        <form method="POST">

            {% csrf_token %}

            <input
                type="text"
                name="username"
                placeholder="Username"
                required>

            <input
                type="email"
                name="email"
                placeholder="Email Address"
                required>

            <input
                type="password"
                name="password"
                placeholder="Password"
                required>

            <button type="submit">
                Create Account
            </button>

        </form>

        <div class="login-links">

            <a href="/login/">
                Already have an account? Login
            </a>

        </div>

    </div>

</div>

{% endblock %}
