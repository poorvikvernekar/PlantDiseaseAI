{% extends 'base.html' %}
{% load static %}

{% block content %}

<div class="login-page">

    <div class="login-card">

        <h1>🔐 Login</h1>

        <p>
            Sign in to access your disease detection history and analytics.
        </p>

        {% if error %}
        <p style="color:red; margin-bottom:15px;">
            {{ error }}
        </p>
        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <input
                type="text"
                name="username"
                placeholder="Username"
                required>

            <input
                type="password"
                name="password"
                placeholder="Password"
                required>

            <button type="submit">
                Login
            </button>

        </form>

        <div class="login-links">

            <a href="#">
                Forgot Password?
            </a>

            <br><br>

            <a href="/signup/">
                Create New Account
            </a>

        </div>

    </div>

</div>

{% endblock %}
